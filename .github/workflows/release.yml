name: release

# Build and publish host binaries on every version tag, so `bootstrap.sh` can
# install devvm without a Go toolchain. Cut a release with:
#   git tag vX.Y.Z && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Build with the exact toolchain in .go-version (not go.mod's floor), so
      # CI and local `mise` compile the guest agents with the same compiler and
      # the committed bytes stay reproducible.
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version

      # Guard against a stale/dirty commit of the embedded guest agents: rebuild
      # them and fail if they differ from what's committed. Reproducible because
      # this runner and local `mise` build with the same toolchain (both read
      # .go-version) and build.sh strips paths/VCS stamps, so identical source
      # yields identical bytes.
      - name: Verify committed guest agents are up to date
        run: |
          ./build.sh
          git diff --exit-code internal/agentbin/bin/ || {
            echo "::error::internal/agentbin/bin/ is stale — run ./build.sh and commit the result"
            exit 1
          }

      # release.sh re-embeds the linux guest agents (build.sh) and cross-compiles
      # the host binary for darwin/linux × arm64/amd64 into dist/, plus SHA256SUMS.
      - name: Build release binaries
        run: ./release.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/devvm-darwin-arm64 \
            dist/devvm-darwin-amd64 \
            dist/devvm-linux-arm64 \
            dist/devvm-linux-amd64 \
            dist/SHA256SUMS \
            --title "devvm ${GITHUB_REF_NAME}" \
            --generate-notes
